[SplunkSentinel - Brute Force Detection]
search = index=main sourcetype=authentication action=failure | stats count by src_ip, user | where count > 20 | sort -count
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.severity = 4
alert_condition = search count > 0
action.sentinel_alert = 1

[SplunkSentinel - Lateral Movement Detection]
search = index=main (dest_port=3389 OR dest_port=22 OR dest_port=445) | stats dc(dest_ip) as target_count, values(dest_ip) as targets by src_ip | where target_count > 3
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 5
alert_condition = search count > 0
action.sentinel_alert = 1

[SplunkSentinel - Data Exfiltration Monitor]
search = index=main sourcetype=network direction=outbound | stats sum(bytes) as total_bytes by src_ip, dest_ip | where total_bytes > 1073741824 | sort -total_bytes
dispatch.earliest_time = -30m
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
alert.severity = 5
alert_condition = search count > 0
action.sentinel_alert = 1

[SplunkSentinel - Anomaly Forecast Trigger]
search = index=main | timechart span=1h count | predict algorithm=LLP5 future_timespan=24 | where count > upper95
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
alert.severity = 3
action.sentinel_alert = 1
